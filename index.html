<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>H view Hero Animation</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: #f8f0dc; }
  body { overflow-x: hidden; }

  .hero {
    position: relative;
    width: 100%;
    max-width: 1672px;
    aspect-ratio: 1672 / 941;
    margin: 0 auto;
    overflow: hidden;
    background: #f8f0dc;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }

  @media (prefers-reduced-motion: reduce) {
    canvas { animation: none !important; }
  }
</style>
</head>
<body>
<main class="hero" id="hero" aria-label="H view">
  <canvas id="c"></canvas>
</main>

<script>
(() => {
  const W = 1672, H = 941;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  canvas.width  = W;
  canvas.height = H;

  // パーツ定義（元HTMLと同じ座標・サイズ）
  const PARTS = [
    { id: 'sun',          src: 'assets/sun.png',           x: 0.1052631579, y: 0.1052072264, w: 0.0729665072, h: 0.1243358130, depth: 0.20 },
    { id: 'cloud_top',    src: 'assets/cloud_top.png',     x: 0.2218899522, y: 0.0552603613, w: 0.0885167464, h: 0.0818278427, depth: 0.13 },
    { id: 'cloud_left',   src: 'assets/cloud_left.png',    x: 0.0227272727, y: 0.1965993624, w: 0.0765550239, h: 0.0626992561, depth: 0.10 },
    { id: 'cloud_right',  src: 'assets/cloud_right.png',   x: 0.7511961722, y: 0.1370882040, w: 0.0717703349, h: 0.0637619554, depth: 0.12 },
    { id: 'cloud_far_right', src: 'assets/cloud_far_right.png', x: 0.9102870813, y: 0.2231668438, w: 0.0759569378, h: 0.0648246546, depth: 0.09 },
    { id: 'bird',         src: 'assets/bird.png',           x: 0.7900717703, y: 0.2454835282, w: 0.0382775120, h: 0.0478214665, depth: 0.24 },
    { id: 'steam',        src: 'assets/steam.png',          x: 0.1214114833, y: 0.3060573858, w: 0.0101674641, h: 0.0116896918, depth: 0.08 },
  ];

  // 画像読み込み
  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload  = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  let base, cover, parts = [];
  let t = 0;
  let mouseX = 0, mouseY = 0, curX = 0, curY = 0;
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

  // アニメーション計算
  function getOffset(id, t) {
    if (reduceMotion) return { x: 0, y: 0, sx: 1, sy: 1, op: 1, rot: 0 };
    switch(id) {
      case 'sun': {
        const s = Math.sin(t / 5.8 * Math.PI * 2);
        return { x: s * 0.035 * W, y: -Math.abs(s) * 0.09 * H, rot: s * 0.015 };
      }
      case 'cloud_top': {
        const s = Math.sin((t / 7.2 - 1.2/7.2) * Math.PI * 2);
        return { x: s * 0.024 * W, y: s * -0.088 * H * 0.5 };
      }
      case 'cloud_left': {
        const s = Math.sin((t / 7.9 - 3.8/7.9) * Math.PI * 2);
        return { x: s * -0.019 * W, y: s * 0.082 * H * 0.5 };
      }
      case 'cloud_right': {
        const s = Math.sin((t / 7.5 - 2.4/7.5) * Math.PI * 2);
        return { x: s * 0.024 * W, y: s * -0.088 * H * 0.5 };
      }
      case 'cloud_far_right': {
        const s = Math.sin((t / 8.3 - 4.6/8.3) * Math.PI * 2);
        return { x: s * -0.019 * W, y: s * 0.082 * H * 0.5 };
      }
      case 'bird': {
        const s = Math.sin((t / 4.3 - 1.0/4.3) * Math.PI * 2);
        return { x: s * 0.036 * W, y: s * -0.105 * H, rot: s * 0.02 };
      }
      case 'steam': {
        const p = (t % 2.3) / 2.3;
        const op = p < 0.45 ? p/0.45 : p < 0.9 ? 1-(p-0.45)/0.45 : 0.12;
        const tx = p < 0.45 ? p/0.45 * 0.10 * W * 0.01 : (0.10 - (p-0.45)/0.45 * 0.18) * W * 0.01;
        const ty = -p * 0.52 * H * 0.01;
        return { x: tx, y: ty, op: Math.max(0.1, op) };
      }
      default: return { x:0, y:0 };
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // 背景
    ctx.drawImage(base, 0, 0, W, H);

    // パーツ（cover patchより前）
    for (const p of parts) {
      if (p.id === 'steam') continue; // steamは最後
      const off = getOffset(p.id, t);
      const px = (p.x * W + off.x + curX * p.depth);
      const py = (p.y * H + off.y + curY * p.depth);
      const pw = p.w * W;
      const ph = p.h * H;
      ctx.save();
      if (off.rot) {
        ctx.translate(px + pw/2, py + ph/2);
        ctx.rotate(off.rot);
        ctx.drawImage(p.img, -pw/2, -ph/2, pw, ph);
      } else {
        ctx.globalAlpha = off.op ?? 1;
        ctx.drawImage(p.img, px, py, pw, ph);
      }
      ctx.restore();
    }

    // cover patch（パーツの元位置を隠す）
    ctx.drawImage(cover, 0, 0, W, H);

    // steam（最前面）
    const steam = parts.find(p => p.id === 'steam');
    if (steam) {
      const off = getOffset('steam', t);
      ctx.save();
      ctx.globalAlpha = off.op ?? 1;
      ctx.drawImage(steam.img,
        steam.x * W + off.x + curX * steam.depth,
        steam.y * H + off.y + curY * steam.depth,
        steam.w * W, steam.h * H
      );
      ctx.restore();
    }
  }

  let lastTime = 0;
  function loop(ts) {
    const dt = (ts - lastTime) / 1000;
    lastTime = ts;
    t += dt;
    curX += (mouseX - curX) * 0.08;
    curY += (mouseY - curY) * 0.08;
    draw();
    requestAnimationFrame(loop);
  }

  // マウスパララックス
  const heroEl = document.getElementById('hero');
  heroEl.addEventListener('pointermove', e => {
    if (reduceMotion) return;
    const r = heroEl.getBoundingClientRect();
    mouseX = ((e.clientX - r.left) / r.width  - 0.5) * 2 * 9;
    mouseY = ((e.clientY - r.top)  / r.height - 0.5) * 2 * 6.5;
  }, { passive: true });
  heroEl.addEventListener('pointerleave', () => { mouseX = 0; mouseY = 0; }, { passive: true });

  // 全画像ロード後にスタート
  Promise.all([
    loadImage('assets/hero-original.png'),
    loadImage('assets/cover-patches.png'),
    ...PARTS.map(p => loadImage(p.src).then(img => { p.img = img; return p; }))
  ]).then(([b, c, ...ps]) => {
    base  = b;
    cover = c;
    parts = ps;
    requestAnimationFrame(loop);
  });
})();
</script>
</body>
</html>
